version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: cultour_db
      POSTGRES_USER: cultour_user
      POSTGRES_PASSWORD: cultour123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cultour_user:cultour123@postgres:5432/cultour_db
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: